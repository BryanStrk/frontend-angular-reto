<nav class="navbar navbar-expand-lg" style="background-color: var(--bg-navbar)" aria-label="Navegación principal">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/" (click)="cerrarMenu()" aria-label="EventoPass - Ir a inicio">
      <div class="logo-box">
        <i class="bi bi-ticket-perforated-fill" aria-hidden="true"></i>
      </div>
      <span class="brand-name">EventoPass</span>
    </a>

    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuAbierto"
      aria-controls="navbar-menu"
      [attr.aria-label]="menuAbierto ? 'Cerrar menú' : 'Abrir menú'"
    >
      <span class="navbar-toggler-icon" aria-hidden="true"></span>
    </button>

    <div id="navbar-menu" class="navbar-collapse custom-mobile-menu" [class.show]="menuAbierto">
      <ul class="navbar-nav mx-auto gap-3">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="cerrarMenu()">
            Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/eventos" routerLinkActive="active" (click)="cerrarMenu()">
            Eventos
          </a>
        </li>

        @if (obtenerRolUsuario() === 'ADMIN') {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/eventos" routerLinkActive="active" (click)="cerrarMenu()">
              Gestión de eventos
            </a>
          </li>
        }

        @if (estaLogueado()) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/mis-reservas" routerLinkActive="active" (click)="cerrarMenu()">
              Mis Reservas
            </a>
          </li>
        }
      </ul>

      <div class="d-flex align-items-center gap-3 nav-actions">
        @if (estaLogueado()) {
          <span class="nav-user">
            <i class="bi bi-person-circle" aria-hidden="true"></i>
            {{ obtenerNombreUsuario() }}
          </span>

          <button class="btn btn-logout" (click)="cerrarSesion()">
            Cerrar sesión
          </button>
        } @else {
          <a class="nav-link" routerLink="/login" (click)="cerrarMenu()">
            Iniciar sesión
          </a>

          <a class="btn btn-primary-custom" routerLink="/register" (click)="cerrarMenu()">
            Regístrate
          </a>
        }
      </div>
    </div>
  </div>
</nav>
